worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Security ──────────────────────────────────────────────
    server_tokens off;

    # ── Logging ───────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ───────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # ── Gzip ──────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/css
        text/plain
        application/json
        application/javascript
        text/xml
        application/xml;

    # ── TLS Session ───────────────────────────────────────────
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── Upstream DNS ──────────────────────────────────────────
    # Use Docker's internal resolver so nginx re-resolves the 'server'
    # hostname on each request instead of caching the IP at startup.
    # This prevents 502s after the server container is recreated.
    resolver 127.0.0.11 valid=5s ipv6=off;

    # ── Rate Limiting ─────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;

    # ── HTTP → HTTPS Redirect ─────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        location /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTP plain (port 8080) — local dev / testing only ─────
    # Bypasses TLS so browsers can access the app without cert warnings.
    server {
        listen 8080;
        server_name _;
        set $upstream_server server;

        # Redirect bare root to the app
        location = / {
            return 301 /app/;
        }

        # SPA — dist is physically at /usr/share/nginx/html/app/
        root /usr/share/nginx/html;

        # Named location breaks the redirect cycle: try_files fallback goes here
        # directly without re-entering location matching.
        location @spa8080 {
            add_header Cache-Control "no-cache";
            try_files /app/index.html =404;
        }

        location /app/assets/ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location /app/ {
            try_files $uri $uri/ @spa8080;
            add_header Cache-Control "no-cache";
        }

        # ── Auth Rate Limiting ───────────────────────────────
        location /api/auth/ {
            limit_req zone=auth_limit burst=20 nodelay;
            rewrite ^/api(/.*) $1 break;
            proxy_pass http://$upstream_server:3443;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── SSE Events ───────────────────────────────────────
        location /events {
            proxy_pass http://$upstream_server:3443;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 0;
            proxy_send_timeout 0;
            chunked_transfer_encoding off;
        }

        # ── API Proxy ────────────────────────────────────────
        location /api/ {
            rewrite ^/api(/.*) $1 break;
            proxy_pass http://$upstream_server:3443;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ── HTTPS Server ──────────────────────────────────────────
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name _;
        set $upstream_server server;

        # ── TLS Configuration ────────────────────────────────
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # ── Security Headers ─────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # Redirect bare root to the app
        location = / {
            return 301 /app/;
        }

        # SPA — dist is physically at /usr/share/nginx/html/app/
        root /usr/share/nginx/html;

        location @spa443 {
            add_header Cache-Control "no-cache";
            try_files /app/index.html =404;
        }

        location /app/assets/ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

         location /app/ {
            try_files $uri $uri/ @spa443;
            add_header Cache-Control "no-cache";
        }

        # ── Health Check ─────────────────────────────────────
        location /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # ── Auth Rate Limiting ───────────────────────────────
        location /api/auth/ {
            limit_req zone=auth_limit burst=20 nodelay;
            rewrite ^/api(/.*) $1 break;
            proxy_pass http://$upstream_server:3443;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── SSE Events ───────────────────────────────────────
        location /events {
            proxy_pass http://$upstream_server:3443;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 0;
            proxy_send_timeout 0;
            chunked_transfer_encoding off;
        }

         # ── API Proxy ────────────────────────────────────────
        location /api/ {
            rewrite ^/api(/.*) $1 break;
            proxy_pass http://$upstream_server:3443;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Static assets (non-app) ───────────────────────────
        location / {
            try_files $uri $uri/ =404;
        }
    }
}
