[build]
  command = "chmod +x scripts/build-netlify.sh && bun install --frozen-lockfile && bash scripts/build-netlify.sh"
  publish = "apps/landing/out"

# Serve the dashboard SPA under /app/*
[[redirects]]
  from = "/app/*"
  to = "/app/index.html"
  status = 200
  force = true

# Security headers for dashboard
[[headers]]
  for = "/app/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # connect-src intentionally restricted to 'self' here as a fallback.
    # The actual CSP with the API origin is injected at build time by
    # scripts/build-netlify.sh using $VITE_API_URL → _headers file.
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';"
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

# Security headers for all pages (landing)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    # connect-src intentionally restricted to 'self' here as a fallback.
    # The actual CSP with the API origin is injected at build time by
    # scripts/build-netlify.sh using $VITE_API_URL → _headers file.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';"

# Cache Vite hashed assets
[[headers]]
  for = "/app/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache Next.js static assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
