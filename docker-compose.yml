services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    ports:
      - "3443:3443"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_PATH: /app/data/conduit.db

      # ── URLs ────────────────────────────────────────────────────
      # Public URL of your Conduit instance (used in magic link emails).
      #
      # ⚠️  PRODUCTION WARNING: Change these to https:// before exposing to the internet.
      #    Plaintext HTTP exposes session cookies, magic-link tokens, and OAuth codes
      #    to any network observer. The server enforces https:// for API_URL in production
      #    mode (NODE_ENV=production), so you must update both values together.
      #    Example: APP_URL: https://conduit.example.com
      #             API_URL: https://api.conduit.example.com
      #
      # These defaults are safe for local testing only (localhost, no TLS required).
      APP_URL: http://localhost:8080
      # Must match VITE_API_URL in the web build args below.
      API_URL: http://localhost:3443

      # ── Secrets ─────────────────────────────────────────────────
      # Secrets are loaded from .env (generated by ./scripts/generate-secrets.sh).
      # Do not add secrets here — .env is gitignored.

      # ── Email (Resend) ───────────────────────────────────────────
      # Get a free API key at https://resend.com
      # Leave blank to print magic links to server logs instead of emailing them.
      RESEND_API_KEY: ""
      RESEND_FROM_EMAIL: "Conduit <noreply@your-domain.com>"

      # ── OpenCode (optional) ──────────────────────────────────────
      # Set if you use OpenCode. URL of your `opencode serve` / `opencode web` server.
      # OPENCODE_SERVER_URL: "http://host.docker.internal:3000"
      # OPENCODE_SERVER_PASSWORD: ""

      # ── OAuth (optional) ─────────────────────────────────────────
      # GitHub OAuth: https://github.com/settings/developers
      # GITHUB_CLIENT_ID: ""
      # GITHUB_CLIENT_SECRET: ""
      # GitLab OAuth (gitlab.com or self-hosted):
      # GITLAB_CLIENT_ID: ""
      # GITLAB_CLIENT_SECRET: ""
      # GITLAB_BASE_URL: "https://gitlab.com"

      # ── Trusted Proxies (optional) ───────────────────────────────
      # Comma-separated list of trusted proxy IPs/CIDRs for real IP forwarding.
      # Required if running behind a reverse proxy (e.g. 172.16.0.0/12 for Docker).
      # TRUSTED_PROXIES: ""

    volumes:
      - conduit_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3443/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - web_dist:/usr/share/nginx/html:ro
    depends_on:
      server:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.static
      args:
         # Baked into the frontend bundle at build time — must match API_URL above.
         # Use http://localhost:3443 for local testing (avoids self-signed cert issues).
         # Change to https://api.yourdomain.com for production.
         VITE_API_URL: http://localhost:3443
    volumes:
      - web_dist:/output

volumes:
  conduit_data:
  web_dist:
