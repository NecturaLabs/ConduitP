# CI/CD pipeline for Conduit Frontend
# Builds and deploys frontend (landing + web) to Netlify
#
# Architecture:
#   bun install → build landing + web → merge outputs → deploy to Netlify
#
# Required repository secrets:
#   NETLIFY_AUTH_TOKEN - Netlify personal access token (org-level)
#
# Required repository variables:
#   DEPLOY_FRONTEND  - Set to 'true' to enable Netlify deploy
#   VITE_API_URL     - API base URL (e.g. https://api.conduit.example.com)
#   NETLIFY_SITE_ID  - Netlify site ID
#
# Optional repository variables:
#   ASSETLINKS_FINGERPRINT - SHA-256 cert fingerprint for Android App Links (assetlinks.json)

name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'apps/landing/**'
      - 'packages/shared/**'
      - 'netlify.toml'
      - 'scripts/build-netlify.sh'
      - '.github/workflows/deploy-frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'apps/landing/**'
      - 'packages/shared/**'
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-frontend:
    if: "!(github.actor == 'dependabot[bot]' && github.event_name == 'pull_request')"
    name: Frontend — Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Build shared types
        run: bun run --filter @conduit/shared build

      - name: Build frontend
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          ASSETLINKS_FINGERPRINT: ${{ vars.ASSETLINKS_FINGERPRINT }}
        run: bash scripts/build-netlify.sh

      - name: Deploy to Netlify
        if: >-
          vars.DEPLOY_FRONTEND == 'true'
          && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
          && github.ref == 'refs/heads/main'
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: './apps/landing/out'
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from ${{ github.ref_name }} @ ${{ github.sha }}"
          enable-pull-request-comment: false
          enable-commit-comment: true
          overwrites-pull-request-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ vars.NETLIFY_SITE_ID }}
