# CI/CD pipeline for Conduit Frontend
# Builds frontend (landing + web)
#
# Architecture:
#   bun install → build landing + web → merge outputs
#
# Required repository variables:
#   VITE_API_URL     - API base URL (e.g. https://api.conduit.example.com)
#
name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'apps/landing/**'
      - 'packages/shared/**'
      - 'netlify.toml'
      - 'scripts/build-netlify.sh'
      - '.github/workflows/deploy-frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'apps/landing/**'
      - 'packages/shared/**'
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-frontend:
    if: "!(github.actor == 'dependabot[bot]' && github.event_name == 'pull_request')"
    name: Frontend — Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Build shared types
        run: bun run --filter @conduit/shared build

      - name: Build frontend
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_COMMIT_SHA: ${{ github.sha }}
        run: bash scripts/build-netlify.sh
