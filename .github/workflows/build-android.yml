name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - 'apps/web/src/**'
      - 'apps/web/package.json'
      - 'packages/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write  # required to create GitHub Releases and upload APK artifacts

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3'

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install root dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Build shared package
        run: bun run build
        working-directory: packages/shared

      - name: Build web app
        run: bun run build
        working-directory: apps/web
        env:
          VITE_MOBILE: 'true'

      - name: Sync Capacitor Android
        run: bunx cap sync android
        working-directory: apps/mobile

      - name: Setup Gradle cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('apps/mobile/android/**/*.gradle*', 'apps/mobile/android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew
        working-directory: apps/mobile/android

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon
        working-directory: apps/mobile/android

      # ── Sign the APK ────────────────────────────────────────────────────────
      # Requires these repository secrets:
      #   ANDROID_KEYSTORE_BASE64  — base64-encoded .keystore file
      #   ANDROID_KEY_ALIAS        — key alias (e.g. conduit)
      #   ANDROID_KEY_PASSWORD     — key password
      #   ANDROID_STORE_PASSWORD   — keystore password
      #
      # Generate once with: scripts/generate-keystore.sh
      - name: Sign APK
        run: |
          # Write keystore with restrictive permissions before populating it.
          # 'install -m 600' creates the file with 0600 in a single atomic step,
          # preventing a window where another process could read a world-readable file.
          install -m 600 /dev/null /tmp/conduit.keystore
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > /tmp/conduit.keystore
          $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)/apksigner sign \
            --ks /tmp/conduit.keystore \
            --ks-key-alias "${{ secrets.ANDROID_KEY_ALIAS }}" \
            --ks-pass "pass:${{ secrets.ANDROID_STORE_PASSWORD }}" \
            --key-pass "pass:${{ secrets.ANDROID_KEY_PASSWORD }}" \
            --out apps/mobile/android/app/build/outputs/apk/release/conduit-signed.apk \
            apps/mobile/android/app/build/outputs/apk/release/app-release-unsigned.apk
          # Securely overwrite before deletion to prevent recovery from disk
          shred -u /tmp/conduit.keystore 2>/dev/null || rm -f /tmp/conduit.keystore

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep 'versionName' apps/mobile/android/app/build.gradle | grep -oP '"\K[^"]+' | head -1)
          echo "version=${VERSION:-1.0}" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: conduit-android-${{ steps.version.outputs.version }}-${{ github.run_number }}
          path: apps/mobile/android/app/build/outputs/apk/release/conduit-signed.apk
          retention-days: 30

      # ── Create GitHub Release on main branch push ──────────────────────────
      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2.5.0  # pinned: v2.5.0 has a known finalize retry bug (softprops/action-gh-release#704)
        with:
          tag_name: android-${{ steps.version.outputs.version }}-build${{ github.run_number }}
          name: "Conduit Android v${{ steps.version.outputs.version }} (build ${{ github.run_number }})"
          body: |
            ## Conduit Android APK

            **Build:** ${{ github.run_number }}
            **Commit:** ${{ github.sha }}

            ### Install
            1. Download `conduit-signed.apk` below
            2. On your Android device: Settings → Security → Install unknown apps → allow your browser
            3. Open the downloaded APK to install

            ### Requirements
            - Android 7.0+ (API 24)
          files: apps/mobile/android/app/build/outputs/apk/release/conduit-signed.apk
          fail_on_unmatched_files: false
          make_latest: true
          draft: false
          prerelease: false
